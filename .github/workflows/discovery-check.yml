name: discovery-check
# THROWAWAY: verifies the direct-RSS discovery path pulls real content at the
# automated level (see the discovery fix). Runs on push to the fix branch only,
# writes to a scratch data dir (no PR, no site change), and is scoped to the RSS
# feeds so it doesn't trigger full podcast transcription. Delete before merge.
on:
  push:
    branches: [claude/housing-statement-prs-check-epgirp]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discovery-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Prep scratch data (RSS-only, fresh ledger)
        run: |
          cp -r data /tmp/scratch-data
          python - <<'PY'
          import json
          # Keep only outlet RSS feeds enabled — this check is about RSS, not the
          # audio/social paths (podcasts would each cost a full transcription).
          sp = "/tmp/scratch-data/registry/sources.json"
          s = json.load(open(sp))
          for f in s["feeds"]:
              if f["type"] != "rss":
                  f["enabled"] = False
          json.dump(s, open(sp, "w"), indent=2)
          # Drop per-candidate youtube/bluesky/google-news feeds so only the
          # outlet RSS feeds are polled.
          cp = "/tmp/scratch-data/registry/candidates.json"
          c = json.load(open(cp))
          for cand in c["candidates"]:
              for k in ("youtube_channel", "bluesky", "google_news_rss"):
                  cand.pop(k, None)
          json.dump(c, open(cp, "w"), indent=2)
          # Start from an empty ledger so every current RSS item counts as new
          # (the real ledger has none of these outlet URLs anyway).
          json.dump({"seen": []}, open("/tmp/scratch-data/ledger.json", "w"))
          print("scratch prepped: RSS-only, empty ledger")
          PY
      - name: Run discovery (scratch, no PR)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python -m pipeline --data-dir /tmp/scratch-data discover \
            --pr-body-out /tmp/pr_body.md --max-items 8
          echo "===== pr_body.md ====="; cat /tmp/pr_body.md
          echo "===== new ledger (host summary — proves which outlets were pulled) ====="
          python - <<'PY'
          import json, collections
          from urllib.parse import urlparse
          seen = json.load(open("/tmp/scratch-data/ledger.json"))["seen"]
          hosts = collections.Counter(urlparse(u).netloc for u in seen)
          print("total pulled:", len(seen))
          for h, n in hosts.most_common():
              print(f"  {n:3d}  {h}")
          PY
