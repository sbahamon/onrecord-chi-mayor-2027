name: discover

on:
  schedule:
    - cron: "0 12 * * *" # daily ~7am Central
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          # Audio transcription downsamples with ffmpeg before upload; ensure it exists.
          ffmpeg -version >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y ffmpeg)
          python -m pip install --upgrade pip
          pip install -e ".[live]"
      - name: Run discovery
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -m pipeline discover --pr-body-out pr_body.md
      - name: Open PR with findings
        uses: peter-evans/create-pull-request@v6
        with:
          # PAT (not GITHUB_TOKEN) so the review workflow fires on this PR.
          token: ${{ secrets.PIPELINE_PAT }}
          branch: discovery/auto
          delete-branch: true
          title: "Discovery: new candidate housing statements"
          body-path: pr_body.md
          labels: pipeline, needs-review
          # Whole data/ dir: robust when a run produces no positions/ or other subdir.
          add-paths: data
