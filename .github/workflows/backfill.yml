name: backfill

# One-time historical seed of the matrix, run by hand. Reads the in-repo row list
# data/backfill/phase1.json and opens ONE PR per candidate (branch backfill/<slug>),
# each auto-reviewed by review.yml (it fires on the `pipeline` label via PIPELINE_PAT).
# A final job seeds the ledger once so the daily cron never re-processes these URLs.
#
# Input is in-repo (not untrusted issue/PR text), so no sanitization dance is needed.

on:
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      slugs: ${{ steps.slugs.outputs.slugs }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compute candidate matrix from the row list
        id: slugs
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          raw = json.loads(Path("data/backfill/phase1.json").read_text())
          rows = raw["rows"] if isinstance(raw, dict) else raw
          slugs = sorted({r["candidate_slug"] for r in rows})
          print("slugs=" + json.dumps(slugs))
          PY

  backfill:
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      # One isolated run per candidate: each job's working tree ends up holding
      # ONLY that candidate's files, so `add-paths: data` stages exactly one PR's
      # worth of changes (and dodges the glob-miss trap noted in CLAUDE.md).
      max-parallel: 3
      fail-fast: false
      matrix:
        slug: ${{ fromJSON(needs.plan.outputs.slugs) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[live]"

      - name: Backfill ${{ matrix.slug }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Phase 1 pages are HTML (trafilatura); no audio, so GROQ_API_KEY unused.
          SLUG: ${{ matrix.slug }}
        run: |
          python -m pipeline backfill \
            --input data/backfill/phase1.json \
            --only "$SLUG" \
            --out-dir . \
            --pr-body-out pr_body.md \
            --skip-ledger

      - name: Open PR for ${{ matrix.slug }}
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PIPELINE_PAT }}
          branch: backfill/${{ matrix.slug }}
          delete-branch: true
          title: "Backfill: ${{ matrix.slug }} housing positions"
          body-path: pr_body.md
          labels: pipeline, needs-review
          # Whole data/ dir: this isolated run only produced this candidate's files.
          add-paths: data

  seed-ledger:
    # After every candidate PR is open, record all backfilled URLs as seen in a
    # single small PR — keeps the per-candidate PRs free of ledger merge conflicts.
    needs: backfill
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[live]"

      - name: Mark every backfilled URL in the ledger
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from pipeline import discover
          raw = json.loads(Path("data/backfill/phase1.json").read_text())
          rows = raw["rows"] if isinstance(raw, dict) else raw
          led = discover.Ledger(Path("data/ledger.json"))
          led.mark_all([{"url": r["url"]} for r in rows])
          led.save()
          PY

      - name: Open ledger-seed PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PIPELINE_PAT }}
          branch: backfill/ledger-seed
          delete-branch: true
          title: "Backfill: seed ledger with Phase 1 URLs"
          body: >
            Marks the Phase 1 backfill URLs as seen so the daily discover cron never
            re-processes them. No candidate data — only data/ledger.json.
          add-paths: data/ledger.json
